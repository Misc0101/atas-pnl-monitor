<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="64" fill="#1a1a1a"/>

  <!-- Subtle grid lines -->
  <line x1="64" y1="170" x2="448" y2="170" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="64" y1="256" x2="448" y2="256" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="64" y1="342" x2="448" y2="342" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Y axis -->
  <line x1="88" y1="80" x2="88" y2="400" stroke="#333" stroke-width="2"/>
  <!-- X axis -->
  <line x1="88" y1="380" x2="448" y2="380" stroke="#333" stroke-width="2"/>

  <!-- Teal PnL curve -->
  <polyline
    points="88,340 148,300 196,320 248,220 296,180 340,160 388,200 440,130"
    fill="none"
    stroke="#2dd4bf"
    stroke-width="9"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Data point dots -->
  <circle cx="88"  cy="340" r="7" fill="#2dd4bf"/>
  <circle cx="148" cy="300" r="7" fill="#2dd4bf"/>
  <circle cx="196" cy="320" r="7" fill="#2dd4bf"/>
  <circle cx="248" cy="220" r="7" fill="#2dd4bf"/>
  <circle cx="296" cy="180" r="7" fill="#2dd4bf"/>
  <circle cx="340" cy="160" r="7" fill="#2dd4bf"/>
  <circle cx="388" cy="200" r="7" fill="#2dd4bf"/>
  <circle cx="440" cy="130" r="7" fill="#2dd4bf"/>
</svg>
